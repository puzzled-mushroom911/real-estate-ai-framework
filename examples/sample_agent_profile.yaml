# ============================================================
# EXAMPLE: Agent Profile for Jane Smith
# ============================================================
# This is a sample showing how a configured profile looks.
# Copy config/agent_profile.yaml and fill in your own details.

agent:
  name: "Jane Smith"
  phone: "(555) 867-5309"
  email: "jane@sunshinerealty.com"
  website: "https://www.sunshinerealty.com"
  brokerage: "Sunshine Realty Group"
  city: "Tampa"
  state: "FL"
  booking_link: "https://calendly.com/jane-smith-realty"
  credential_line: "Over 8 years helping buyers relocate to Tampa Bay."
  team_description: "solo agent"

content_sources:
  youtube:
    - handle: "@janesmithrealty"
      name: "Jane Smith Realty"
      db_name: "youtube_jane_smith"

  # competitors:
  #   - handle: "@CompetitorChannel"
  #     name: "Competitor Name"
  #     db_name: "youtube_competitor"

paths:
  knowledge_bases: "./knowledge_bases/vectors"
  transcripts: "./knowledge_bases/transcripts"
  manifest: "~/.real_estate_ai/manifest.json"

content:
  markets:
    - "Tampa"
    - "St. Petersburg"
    - "Clearwater"
    - "Brandon"

  topics:
    - "relocation"
    - "first-time buyers"
    - "market updates"
    - "neighborhoods"
    - "investment properties"

  voice_markers:
    - "here's the thing"
    - "let me be honest"
    - "from what I've seen"

  never_say:
    - "dream home"
    - "perfect home"
